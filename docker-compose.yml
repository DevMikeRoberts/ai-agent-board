services:
  db:
    image: postgres:16-alpine
    container_name: ai-agent-board-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentboard
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: agentboard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
